project:
  type: book
  
book:
  title: "Praca UE"
  subtitle: "Przegląd i meta-analiza literatury naukowej z wykorzystaniem narzędzi data science"
  author: "Grzegorz Kulczycki"
  date: today
  
  chapters:
    - index.qmd
    - Metody.qmd
    - Przeglad_literatury.qmd

   
bibliography: references.bib
lang: pl-PL
crossref:
  chapters: true

