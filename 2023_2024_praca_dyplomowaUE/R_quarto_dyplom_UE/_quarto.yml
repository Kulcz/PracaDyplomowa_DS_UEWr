toccolor: blue
toc-location: right    # -> Tylko HTML (right, left, body)
#toc-expand: true      # -> Tylko HTML
smooth-scroll: true    # -> Tylko HTML płynne przewijanie
# lof: true              # -> Tylko PDF  spis rysunków
# lot: true              # -> Tylko PDF  spis tabel


format:
   pdf:
     documentclass: scrreprt
     colorlinks: true
     fontsize: 12pt
     geometry:
      - top=5mm
      - left=20mm
      - heightrounded
     


   

